<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }} - {{ .Site.Title }}</title>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap");

        :root {
            --bg: #f7f9fc;
            --text: #0f172a;
            --muted: #5b677a;
            --accent: #0ea5e9;
            --accent-2: #14b8a6;
            --border: rgba(15, 23, 42, 0.12);
            --panel: rgba(255, 255, 255, 0.86);
            --panel-strong: #ffffff;
            --shadow: 0 24px 48px rgba(15, 23, 42, 0.12);
            --shadow-soft: 0 12px 24px rgba(15, 23, 42, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: "JetBrains Mono", "Noto Sans SC", monospace;
            line-height: 1.6;
            color: var(--text);
            background-color: var(--bg);
            background-image:
                radial-gradient(circle at 1px 1px, rgba(15, 23, 42, 0.08) 1px, transparent 1px),
                radial-gradient(circle at 20% 20%, rgba(14, 165, 233, 0.12), transparent 45%),
                linear-gradient(120deg, rgba(20, 184, 166, 0.1), transparent 40%);
            background-size: 26px 26px, 60% 60%, 100% 100%;
            min-height: 100vh;
            padding: 28px;
        }

        a { color: inherit; text-decoration: none; }
        img { max-width: 100%; display: block; }

        header, main, footer { max-width: 960px; margin: 0 auto; }

        .site-header {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
            animation: header-in 0.8s ease both;
        }

        .site-header::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(120deg, transparent 35%, rgba(14, 165, 233, 0.16), transparent 65%);
            transform: translateX(-40%);
            opacity: 0;
            animation: sweep 1.8s ease 0.4s forwards;
            pointer-events: none;
        }

        .title-block {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .site-header h1 {
            font-family: "Space Grotesk", "Noto Sans SC", sans-serif;
            font-size: 2.1rem;
            letter-spacing: -0.02em;
        }

        .site-header h1 a { color: inherit; }

        .site-header p {
            color: var(--muted);
            max-width: 44ch;
        }

        .github-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 18px;
            border-radius: 999px;
            border: 1px solid rgba(14, 165, 233, 0.35);
            background: rgba(14, 165, 233, 0.08);
            color: var(--text);
            font-family: "Space Grotesk", "Noto Sans SC", sans-serif;
            font-weight: 600;
            letter-spacing: 0.02em;
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease, color 0.2s ease;
        }

        .github-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(14, 165, 233, 0.2);
            border-color: rgba(14, 165, 233, 0.6);
            color: var(--accent);
        }

        .github-link:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 3px;
        }

        .github-meta {
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }

        .github-label {
            color: var(--muted);
            font-size: 0.78rem;
            letter-spacing: 0.16em;
            text-transform: uppercase;
        }

        main { margin: 32px auto 0; }

        .post-list {
            list-style: none;
            display: grid;
            gap: 16px;
        }

        .post-item {
            background: var(--panel-strong);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 18px 20px 18px 24px;
            box-shadow: var(--shadow-soft);
            position: relative;
            overflow: hidden;
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
            animation: card-in 0.6s ease both;
            animation-delay: calc(var(--i, 0) * 80ms);
        }

        .post-item::after {
            content: "";
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: linear-gradient(180deg, var(--accent), var(--accent-2));
            opacity: 0.75;
        }

        .post-item:hover {
            transform: translateY(-4px);
            border-color: rgba(14, 165, 233, 0.35);
            box-shadow: var(--shadow);
        }

        .post-item a { display: block; }

        .post-item h2 {
            font-family: "Space Grotesk", "Noto Sans SC", sans-serif;
            color: var(--text);
            font-size: 1.3rem;
            margin-bottom: 8px;
            transition: color 0.2s ease;
        }

        .post-item:hover h2 { color: var(--accent); }

        .post-item .date {
            color: var(--muted);
            font-size: 0.85rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .post-item:nth-child(1) { --i: 1; }
        .post-item:nth-child(2) { --i: 2; }
        .post-item:nth-child(3) { --i: 3; }
        .post-item:nth-child(4) { --i: 4; }
        .post-item:nth-child(5) { --i: 5; }
        .post-item:nth-child(6) { --i: 6; }
        .post-item:nth-child(7) { --i: 7; }
        .post-item:nth-child(8) { --i: 8; }

        footer {
            text-align: center;
            color: var(--muted);
            padding: 26px 0 10px;
            margin-top: 36px;
            font-size: 0.85rem;
            border-top: 1px dashed var(--border);
        }

        @keyframes header-in {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes sweep {
            0% { opacity: 0; transform: translateX(-45%); }
            40% { opacity: 1; }
            100% { opacity: 0; transform: translateX(60%); }
        }

        @keyframes card-in {
            from { opacity: 0; transform: translateY(14px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 720px) {
            body { padding: 18px; }
            .site-header { padding: 24px; flex-direction: column; align-items: flex-start; }
            .site-header h1 { font-size: 1.8rem; }
            .github-meta { align-self: stretch; justify-content: space-between; width: 100%; }
            main { margin-top: 24px; }
        }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="title-block">
            <h1><a href="/">{{ .Site.Title }}</a></h1>
            {{ with .Site.Params.description }}
                <p>{{ . }}</p>
            {{ end }}
        </div>
        {{ with .Site.Params.github }}
            <div class="github-meta">
                <span class="github-label">Project Repo</span>
                <a class="github-link" href="{{ . }}" target="_blank" rel="noopener">GitHub</a>
            </div>
        {{ end }}
    </header>
    
    <main>
        <ul class="post-list">
            {{ range .Pages }}
            <li class="post-item">
                <a href="{{ .Permalink }}">
                    <h2>{{ .Title }}</h2>
                    <span class="date">{{ .Date.Format "2006-01-02" }}</span>
                </a>
            </li>
            {{ end }}
        </ul>
    </main>
    
    <footer>
        <p>{{ .Site.Params.author }} | Powered by Hugo + Cloudflare Pages</p>
    </footer>
</body>
</html>
