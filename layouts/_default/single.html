<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }} - {{ .Site.Title }}</title>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap");

        :root {
            --bg: #f7f9fc;
            --text: #0f172a;
            --muted: #5b677a;
            --accent: #0ea5e9;
            --accent-2: #14b8a6;
            --border: rgba(15, 23, 42, 0.12);
            --panel: rgba(255, 255, 255, 0.86);
            --panel-strong: #ffffff;
            --shadow: 0 24px 48px rgba(15, 23, 42, 0.12);
            --shadow-soft: 0 12px 24px rgba(15, 23, 42, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: "JetBrains Mono", "Noto Sans SC", monospace;
            line-height: 1.6;
            color: var(--text);
            background-color: var(--bg);
            background-image:
                radial-gradient(circle at 1px 1px, rgba(15, 23, 42, 0.08) 1px, transparent 1px),
                radial-gradient(circle at 20% 20%, rgba(14, 165, 233, 0.12), transparent 45%),
                linear-gradient(120deg, rgba(20, 184, 166, 0.1), transparent 40%);
            background-size: 26px 26px, 60% 60%, 100% 100%;
            min-height: 100vh;
            padding: 28px;
        }

        a { color: inherit; text-decoration: none; }
        img { max-width: 100%; display: block; }

        header, main, footer { max-width: 960px; margin: 0 auto; }

        .site-header {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 28px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
            animation: header-in 0.8s ease both;
        }

        .site-header.compact { padding: 24px 28px; }

        .site-header::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(120deg, transparent 35%, rgba(14, 165, 233, 0.16), transparent 65%);
            transform: translateX(-40%);
            opacity: 0;
            animation: sweep 1.8s ease 0.4s forwards;
            pointer-events: none;
        }

        .title-block {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .site-header h1 {
            font-family: "Space Grotesk", "Noto Sans SC", sans-serif;
            font-size: 1.9rem;
            letter-spacing: -0.02em;
        }

        .site-header h1 a { color: inherit; }

        .site-header p {
            color: var(--muted);
            max-width: 44ch;
        }

        .github-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 18px;
            border-radius: 999px;
            border: 1px solid rgba(14, 165, 233, 0.35);
            background: rgba(14, 165, 233, 0.08);
            color: var(--text);
            font-family: "Space Grotesk", "Noto Sans SC", sans-serif;
            font-weight: 600;
            letter-spacing: 0.02em;
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease, color 0.2s ease;
        }

        .github-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(14, 165, 233, 0.2);
            border-color: rgba(14, 165, 233, 0.6);
            color: var(--accent);
        }

        .github-link:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 3px;
        }

        main {
            margin: 28px auto 0;
            display: grid;
            gap: 18px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            padding: 8px 14px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: var(--panel);
            color: var(--muted);
            font-size: 0.9rem;
            letter-spacing: 0.02em;
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease, color 0.2s ease;
            width: fit-content;
        }

        .back-link:hover {
            transform: translateY(-1px);
            box-shadow: var(--shadow-soft);
            border-color: rgba(14, 165, 233, 0.35);
            color: var(--accent);
        }

        .back-link:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 3px;
        }

        .post {
            background: var(--panel-strong);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 28px;
            box-shadow: var(--shadow);
            animation: card-in 0.6s ease both;
        }

        .post > h2 {
            font-family: "Space Grotesk", "Noto Sans SC", sans-serif;
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        .post-meta {
            color: var(--muted);
            font-size: 0.85rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 18px;
        }

        .post-content {
            line-height: 1.85;
            color: #1b2436;
        }

        .post-content p { margin-bottom: 16px; }

        .post-content h2 {
            font-family: "Space Grotesk", "Noto Sans SC", sans-serif;
            font-size: 1.4rem;
            margin: 26px 0 12px;
        }

        .post-content h3 {
            font-family: "Space Grotesk", "Noto Sans SC", sans-serif;
            font-size: 1.15rem;
            margin: 20px 0 8px;
        }

        .post-content ul, .post-content ol { margin: 12px 0 16px 20px; }
        .post-content li { margin: 6px 0; }

        .post-content a {
            color: var(--accent);
            text-decoration: underline;
            text-decoration-style: dashed;
            text-underline-offset: 3px;
        }

        .post-content code {
            background: rgba(14, 165, 233, 0.08);
            border: 1px solid rgba(14, 165, 233, 0.2);
            padding: 2px 6px;
            border-radius: 6px;
            font-family: "JetBrains Mono", "Noto Sans SC", monospace;
            font-size: 0.95em;
        }

        .post-content pre {
            background: #0f172a;
            color: #e2e8f0;
            padding: 16px;
            border-radius: 12px;
            overflow-x: auto;
            border: 1px solid rgba(15, 23, 42, 0.2);
            box-shadow: var(--shadow-soft);
            margin: 18px 0;
        }

        .post-content pre code {
            background: none;
            border: none;
            padding: 0;
            color: inherit;
        }

        .post-content blockquote {
            margin: 18px 0;
            padding: 12px 16px;
            border-left: 4px solid var(--accent);
            background: rgba(14, 165, 233, 0.08);
            border-radius: 10px;
            color: var(--muted);
        }

        .post-content hr {
            border: none;
            border-top: 1px dashed var(--border);
            margin: 24px 0;
        }

        .post-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 18px 0;
        }

        .post-content th, .post-content td {
            border: 1px solid var(--border);
            padding: 8px 10px;
            text-align: left;
        }

        footer {
            text-align: center;
            color: var(--muted);
            padding: 26px 0 10px;
            margin-top: 36px;
            font-size: 0.85rem;
            border-top: 1px dashed var(--border);
        }

        @keyframes header-in {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes sweep {
            0% { opacity: 0; transform: translateX(-45%); }
            40% { opacity: 1; }
            100% { opacity: 0; transform: translateX(60%); }
        }

        @keyframes card-in {
            from { opacity: 0; transform: translateY(14px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 720px) {
            body { padding: 18px; }
            .site-header { padding: 22px; flex-direction: column; align-items: flex-start; }
            .site-header h1 { font-size: 1.6rem; }
            .github-link { align-self: stretch; }
            .post { padding: 22px; }
        }
    </style>
</head>
<body>
    <header class="site-header compact">
        <div class="title-block">
            <h1><a href="/">{{ .Site.Title }}</a></h1>
            {{ with .Site.Params.description }}
                <p>{{ . }}</p>
            {{ end }}
        </div>
        {{ with .Site.Params.github }}
            <a class="github-link" href="{{ . }}" target="_blank" rel="noopener">GitHub</a>
        {{ end }}
    </header>

    <main>
        <a href="/" class="back-link">← 返回首页</a>

        <article class="post">
            <h2>{{ .Title }}</h2>
            <div class="post-meta">发布时间: {{ .Date.Format "2006-01-02" }}</div>
            <div class="post-content">
                {{ .Content }}
            </div>
        </article>
    </main>
    
    <footer>
        <p>{{ .Site.Params.author }} | Powered by Hugo + Cloudflare Pages</p>
    </footer>
</body>
</html>
